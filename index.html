<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://saezdevicuna.eus/wp-content/uploads/2026/03/cropped-image-1-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mikel Saez de Vicuña — Turning complex agendas into living initiatives. Strategic communication, global partnerships, and institutional transformation from the Basque Country." />
    <title>Portfolio Mikel Saez de Vicuña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

    <style>
      /* ── Hide ALL Google Translate injected UI ──────────────────────────── */
      .goog-te-banner-frame        { display: none !important; }
      .goog-te-balloon-frame       { display: none !important; }
      #goog-gt-tt                  { display: none !important; }
      .goog-tooltip                { display: none !important; }
      .goog-text-highlight         { background: transparent !important; box-shadow: none !important; }
      .skiptranslate               { display: none !important; }
      /* Prevent body push-down from the hidden banner */
      body                         { top: 0 !important; }
      /* Hide Google Translate top bar */
      body > .skiptranslate        { display: none !important; }
    </style>
    <!-- Netlify Identity Widget for CMS Email Invites -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Google Translate element (hidden) -->
    <div id="google_translate_element" style="display:none;"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Google Translate API ─────────────────────────────────────────── -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', includedLanguages: 'en,es,eu', autoDisplay: false },
          'google_translate_element'
        );
      }

      /* Utility exposed globally so React components can call it */
      window.switchLanguage = function(langCode) {
        var select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = langCode;
          select.dispatchEvent(new Event('change'));
          return;
        }
        /* Fallback: set the cookie that Google Translate reads on load */
        var cookieVal = langCode === 'en'
          ? ''
          : '/en/' + langCode;
        document.cookie = 'googtrans=' + cookieVal + '; path=/';
        document.cookie = 'googtrans=' + cookieVal + '; domain=' + location.hostname + '; path=/';
        location.reload();
      };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
